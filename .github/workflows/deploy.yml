name: Build & Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install frontend dependencies ──────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── 4. Build React frontend ────────────────────────────────────
      - name: Build frontend (production)
        env:
          VITE_API_BASE: /api
          VITE_DEMO_MODE: 'false'
        run: npm run build

      # ── 5. Copy frontend build into backend/dist ───────────────────
      - name: Copy dist into backend/dist
        run: |
          rm -rf backend/dist
          cp -r dist backend/dist

      # ── 6. Setup Python ───────────────────────────────────────────
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ── 7. Install Python dependencies into backend/ ──────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt --target backend/.python_packages/lib/site-packages

      # ── 8. Deploy to Azure App Service ────────────────────────────
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'zaytoun-api-dev-hqtr'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./backend
