name: Build & Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install + Build React frontend ─────────────────────────
      - name: Build frontend (production)
        env:
          VITE_API_BASE: /api
          VITE_DEMO_MODE: 'false'
        run: |
          npm ci
          npm run build

      # ── 4. Copy frontend build into backend/dist ───────────────────
      - name: Bundle frontend into backend
        run: |
          rm -rf backend/dist
          cp -r dist backend/dist

      # ── 5. Deploy backend/ to Azure App Service ────────────────────
      # Azure App Service Linux (Oryx) will automatically install Python
      # dependencies from requirements.txt and start the app using the
      # startup command set via Azure Portal / config.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'zaytoun-api-dev-hqtr'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./backend
